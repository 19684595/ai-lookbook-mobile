services:
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    image: ai-lookbook-backend:hetzner
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "8787"
      DATA_DIR: /app/data
    volumes:
      - lookbook_data:/app/data
    networks:
      - lookbook
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - lookbook

networks:
  lookbook:
    driver: bridge

volumes:
  lookbook_data:
  caddy_data:
  caddy_config:
